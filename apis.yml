aid: invision
name: InVision
description: >-
  InVision was a digital product design platform used by teams to build the
  world's best customer experiences. It provided REST APIs for managing
  prototypes, design documents, boards, comments, workflows, and design system
  components including design tokens and icons via the Design System Manager
  (DSM). InVision shut down all services on January 1, 2025, with its domain
  now redirecting to Miro.
