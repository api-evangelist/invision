apis:
  - aid: invision:invision-dsm-api
    name: InVision DSM Design Tokens API
    description: >-
      The InVision Design System Manager (DSM) API allowed teams to
      programmatically retrieve design tokens (colors, text styles, fonts,
      spacing) and icons from their DSM design system. API keys were scoped per
      design system and used as query parameters. The platform was shut down on
      January 1, 2025.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://support.invisionapp.com/docs/dsm-developer-tools
    baseURL: https://projects.invisionapp.com/dsm-export
    tags:
      - Design Tokens
      - Design Systems
      - DSM
      - Icons
      - Colors
